<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .center-content{
            text-align: center;
            margin-top: 150px;
            font-size: 20px;
        }
        .gear-icon{
           position: fixed;
           top: 20px;;
           left: 20px;
           font-size: 20px;
        }
        .clock-icon{
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 20px;
        }
        .txt{
            color: red;
        }
        body{
            background-color: rgb(249, 217, 217);
        }
        .search-engine{
            width: 40%;
            text-align: center;
            border-radius: 10px;
            border-style: solid;
            font-size: 20px;
        }
        .lens{
            position: relative;
            left:35px;
        }
        .fontstyle{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        .search-suggestion{
            margin-left: auto;
            margin-right: auto;
            text-align: left ;
            width: 30%;
            box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
            padding: 10px;
            border-radius: 10px;

        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <span class="gear-icon">&#9881;</span>
    <span class="clock-icon"> &#9679; online | &#128338; -ms </span>
    <div class="center-content">
    <h1><span class="txt">BEING </span><SPan class="txt2">INFINITY</SPan> </h1>
    <p class="fontstyle">One million phrases. Four algorithms. Prefix Based Auto Suggest</p>
    <span class="lens">&#x1F50D;</span>
    <input class="search-engine" type="text" placeholder="start typing to search phrases">
    <div class="search-suggestion"> 
        <div>Cyber security</div>
        <div>Artificial Intelligence and Data Science</div>
    </div>
    </div>
    <script>
        function getSearchSuggestion(){
            var searchBox=document.getElementsByClassName("search-box");
            var search-suggestion=document.getElementsByClassName("search-suggestions");

            var userInput=searchBox.value;
            if(userInput.trail()=="") return;
            var URL_1="https://autosuggest-backend.onrender.com/api/autosuggest?q=";
            var URL_3="&algorithm=brute&limit=10&weighted=false";
            var URL= URL_1+userInput+URL_3;

            fetch(URL)
            .then(function(response){
                return response.json();
            })
            .then(function(data){
                var searchResults="";
                var suggestions = data.results;
                for(var i=0;i<data.count;i++){
                    searchResults +="<div class = 'suggestions'> "+
                        suggestions[i].text+
                        "</div>"
                }

            })
        }
    </script>
</body>
</html>
